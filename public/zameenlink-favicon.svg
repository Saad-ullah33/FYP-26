<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#1a5fa8"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="28" y1="18" x2="72" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3df08a"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M50 4 L88 21 L88 52 C88 72 68 88 50 96 C32 88 12 72 12 52 L12 21 Z"
        fill="url(#shieldGrad)"/>

  <!-- House body -->
  <polygon points="50,17 73,37 73,59 27,59 27,37" fill="url(#houseGrad)"/>

  <!-- Roof window grid -->
  <rect x="42" y="40" width="16" height="14" rx="2" fill="#082010" opacity="0.72"/>
  <line x1="50" y1="40" x2="50" y2="54" stroke="#082010" stroke-width="1.5" opacity="0.5"/>
  <line x1="42" y1="47" x2="58" y2="47" stroke="#082010" stroke-width="1.5" opacity="0.5"/>

  <!-- Location pin -->
  <circle cx="50" cy="75" r="6.5" fill="#ffffff" opacity="0.95"/>
  <circle cx="50" cy="75" r="2.8" fill="#1a5fa8"/>
  <line x1="50" y1="81.5" x2="50" y2="87" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>

  <!-- Network dots left -->
  <circle cx="19" cy="48" r="4.5" fill="#2ecc71" opacity="0.9"/>
  <line x1="23.5" y1="50" x2="27" y2="52" stroke="#2ecc71" stroke-width="2" opacity="0.65" stroke-linecap="round"/>

  <!-- Network dots right -->
  <circle cx="81" cy="42" r="4" fill="#2ecc71" opacity="0.8"/>
  <line x1="77" y1="44" x2="73" y2="47" stroke="#2ecc71" stroke-width="2" opacity="0.65" stroke-linecap="round"/>

  <!-- Top dot -->
  <circle cx="50" cy="11" r="3.5" fill="#2ecc71" opacity="0.7"/>
</svg>
